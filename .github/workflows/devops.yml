# Название пайплайна, которое будет отображаться во вкладке Actions на GitHub
name: CI/CD Build and Push

on:
  push:
    branches: [ main ]

jobs:
  # ЭТАП 1: Проверка кода на синтаксические ошибки (Линтинг)
  linting:
    runs-on: ubuntu-latest # Выделяем виртуальную машину на Linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Скачиваем код из репозитория

      - name: Set up Python
        uses: actions/setup-python@v5 # Устанавливаем Python
        with:
          python-version: '3.10'

      - name: Install Linters
        run: pip install flake8 # Ставим утилиту для проверки кода

      - name: Run Flake8
        run: flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # Проверяем файлы именно внутри папки backend. 
        # Если где-то критическая ошибка в синтаксисе — пайплайн упадет здесь и не пойдет дальше.

  # ЭТАП 2: Сборка Docker-образа и отправка на Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    needs: linting # Эта задача начнется ТОЛЬКО если линтинг прошел успешно (зеленая галочка)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Снова скачиваем код для сборки

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Готовим Docker к продвинутой сборке

      - name: Login to Docker Hub
        uses: docker/login-action@v3 # Авторизуемся в аккаунте Docker Hub
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5 # Собираем и отправляем образ
        with:
          # Указываем контекст сборки — папку backend (откуда докер будет брать файлы проекта)
          context: ./backend
          
          # Указываем точный путь к Dockerfile внутри этой папки
          file: ./backend/Dockerfile
          
          push: true
          # Собираем образ и вешаем на него тег твоего Docker Hub аккаунта
          # ЗАМЕНИ "название-твоего-репозитория" на любое имя (например: flask-app или django-backend)
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-lab:latest